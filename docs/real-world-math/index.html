
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real World Math — Interactive Workbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:       #4a6741;
    --green-light: #e8f0e5;
    --green-dark:  #2d4a29;
    --brown:       #8b4513;
    --blue:        #2c5a7e;
    --blue-light:  #e8f0f8;
    --gold:        #c9a227;
    --gold-light:  #fdf8e8;
    --parchment:   #f5f2e8;
    --ink:         #1a1a0f;
    --muted:       #6b6b5a;
    --border:      #d4cfbb;
    --white:       #ffffff;
    --red:         #b94040;
    --radius:      10px;
    --shadow:      0 2px 12px rgba(0,0,0,0.10);
    --shadow-lg:   0 8px 32px rgba(0,0,0,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Header ── */
  .site-header {
    background: var(--green-dark);
    color: #fff;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 58px;
  }
  .header-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #fff;
    white-space: nowrap;
  }
  .header-logo span { color: var(--gold); }
  .header-score {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
  }
  .score-badge {
    background: var(--gold);
    color: var(--green-dark);
    border-radius: 20px;
    padding: 3px 12px;
    font-weight: 700;
    font-size: 0.88rem;
    min-width: 80px;
    text-align: center;
  }

  /* ── Cover / Hero ── */
  .cover {
    background: var(--green-dark);
    color: #fff;
    text-align: center;
    padding: 64px 24px 56px;
    position: relative;
    overflow: hidden;
  }
  .cover::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,162,39,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 1.05;
    margin-bottom: 10px;
  }
  .cover-title em { color: var(--gold); font-style: normal; }
  .cover-sub {
    font-size: 1rem;
    color: rgba(255,255,255,0.72);
    margin-bottom: 36px;
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .cover-tags {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .cover-tag {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 0.82rem;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
  }

  /* ── Layout ── */
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 64px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 28px;
    align-items: start;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: sticky;
    top: 74px;
  }
  .sidebar-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .nav-list { list-style: none; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--green-light); color: var(--green); }
  .nav-item.active { background: var(--green); color: #fff; }
  .nav-icon {
    width: 26px;
    height: 26px;
    background: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--brown);
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }
  .nav-item.active .nav-icon { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.4); color: #fff; }
  .nav-progress {
    margin-left: auto;
    font-size: 0.72rem;
    font-family: 'DM Mono', monospace;
    opacity: 0.7;
  }

  /* ── Main Content ── */
  .main { min-width: 0; }

  /* ── Topic Tabs ── */
  .topic-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
  }
  .tab-btn {
    flex: 1;
    padding: 7px 8px;
    border: none;
    background: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
  }
  .tab-btn.active {
    background: var(--green);
    color: #fff;
    box-shadow: 0 2px 8px rgba(74,103,65,0.30);
  }
  .tab-btn:hover:not(.active) { background: var(--green-light); color: var(--green); }

  /* ── Content panels ── */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── Topic Header ── */
  .topic-header {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px 18px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .topic-header-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .topic-icon-lg {
    width: 44px;
    height: 44px;
    background: var(--gold-light);
    border: 2px solid var(--gold);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--brown);
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }
  .topic-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--green-dark);
    line-height: 1.2;
  }
  .topic-desc { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  /* ── Section card ── */
  .section-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--brown);
    margin-bottom: 8px;
  }
  .section-body { font-size: 0.92rem; line-height: 1.65; color: var(--ink); margin-bottom: 10px; }

  /* ── Formula box ── */
  .formula-box {
    background: var(--gold-light);
    border: 1px solid #e8d87a;
    border-left: 4px solid var(--gold);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 10px 0;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--green-dark);
    font-weight: 500;
    line-height: 1.7;
  }

  /* ── Example box ── */
  .example-box {
    background: var(--green-light);
    border: 1px solid #b8d4b0;
    border-left: 4px solid var(--green);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 8px 0;
  }
  .example-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--green-dark);
    margin-bottom: 4px;
  }
  .example-body { font-size: 0.88rem; line-height: 1.6; color: #1a3a16; }
  .example-body b { color: var(--green-dark); }

  /* ── Real World box ── */
  .rw-box {
    background: var(--blue-light);
    border: 1px solid #b8cede;
    border-left: 4px solid var(--blue);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 8px 0;
  }
  .rw-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 4px;
  }
  .rw-body { font-size: 0.88rem; line-height: 1.6; color: #1a3050; }

  /* ── Quiz ── */
  .quiz-header {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 22px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
  }
  .quiz-header-text h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--green-dark);
  }
  .quiz-header-text p { font-size: 0.82rem; color: var(--muted); }
  .quiz-progress-bar-wrap {
    margin-left: auto;
    width: 160px;
  }
  .quiz-progress-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 4px;
    text-align: right;
    font-family: 'DM Mono', monospace;
  }
  .quiz-progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .question-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .question-card.answered-correct { border-color: var(--green); background: #f4faf2; }
  .question-card.answered-wrong   { border-color: var(--red);   background: #fdf4f4; }

  .question-num {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }
  .question-text {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 12px;
    line-height: 1.55;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--parchment);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    color: var(--ink);
    text-align: left;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green-dark);
  }
  .option-btn .opt-letter {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.15s, color 0.15s;
  }
  .option-btn:hover:not(:disabled) .opt-letter {
    background: var(--green);
    color: #fff;
  }
  .option-btn.correct {
    border-color: var(--green);
    background: #e8f5e8;
    color: var(--green-dark);
  }
  .option-btn.correct .opt-letter { background: var(--green); color: #fff; }
  .option-btn.wrong {
    border-color: var(--red);
    background: #fce8e8;
    color: var(--red);
  }
  .option-btn.wrong .opt-letter { background: var(--red); color: #fff; }
  .option-btn.reveal-correct {
    border-color: var(--green);
    background: #e8f5e8;
    color: var(--green-dark);
    opacity: 0.85;
  }
  .option-btn.reveal-correct .opt-letter { background: var(--green); color: #fff; }
  .option-btn:disabled { cursor: default; }

  .feedback-box {
    display: none;
    margin-top: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 0.84rem;
    line-height: 1.5;
    font-weight: 500;
  }
  .feedback-box.correct-fb {
    display: block;
    background: #e8f5e8;
    border: 1px solid #b8d8b8;
    color: var(--green-dark);
  }
  .feedback-box.wrong-fb {
    display: block;
    background: #fce8e8;
    border: 1px solid #e8b8b8;
    color: var(--red);
  }
  .feedback-icon { font-size: 1rem; margin-right: 4px; }

  /* ── Quiz results banner ── */
  .quiz-result {
    display: none;
    background: var(--green-dark);
    color: #fff;
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .quiz-result.visible { display: block; animation: fadeIn 0.35s ease; }
  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .result-label { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }
  .result-message { font-size: 1rem; margin-top: 12px; opacity: 0.9; }
  .result-restart {
    margin-top: 16px;
    background: var(--gold);
    color: var(--green-dark);
    border: none;
    border-radius: 8px;
    padding: 9px 24px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .result-restart:hover { opacity: 0.88; }

  /* ── Responsive ── */
  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; gap: 20px; }
    .sidebar { position: static; }
    .nav-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .nav-item { padding: 6px 10px; font-size: 0.78rem; }
    .options-grid { grid-template-columns: 1fr; }
    .topic-tabs { flex-wrap: wrap; }
    .quiz-progress-bar-wrap { display: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">Real World <span>Math</span></div>
    <div class="header-score">
      Total Score:
      <div class="score-badge" id="globalScore">0 / 0</div>
    </div>
  </div>
</header>

<div class="cover">
  <div class="cover-title">Real World <em>Math</em></div>
  <div class="cover-sub">A Practical High School Mathematics Workbook</div>
  <div class="cover-tags">
    <span class="cover-tag">8 Topics</span>
    <span class="cover-tag">240 Practice Questions</span>
    <span class="cover-tag">Instant Feedback</span>
    <span class="cover-tag">Lessons &amp; Quizzes</span>
  </div>
</div>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-label">Topics</div>
    <ul class="nav-list" id="navList"></ul>
  </aside>

  <!-- Main -->
  <main class="main" id="mainContent"></main>

</div>

<script>
const TOPICS = [
  {
    icon: '%', name: 'Percentages & Tips',
    desc: 'Sales tax, discounts, tipping, and percent change — the math of everyday spending.',
    sections: [
      { title: 'What Is a Percentage?',
        body: 'A percentage is a fraction out of 100. "35%" means 0.35 as a decimal. You use percentages daily: tax rates, sale signs, interest rates, grades, nutritional labels.',
        items: [
          { type: 'formula', text: 'Percent = (Part ÷ Whole) × 100\nPart = Whole × (Percent ÷ 100)' }
        ], rw: null },
      { title: 'Sales Tax',
        body: 'When you buy something, the government charges a tax on top of the sticker price, ranging from 0% to over 10% in some cities. The price on the shelf is rarely what you pay.',
        items: [
          { type: 'formula', text: 'Total Price = Sticker Price × (1 + Tax Rate)' },
          { type: 'example', label: 'Example 1', body: 'A $45 shirt, 8% sales tax → $45 × 1.08 = <b>$48.60</b>' },
          { type: 'example', label: 'Example 2', body: 'Groceries totaling $120, 6.5% tax → $120 × 1.065 = <b>$127.80</b>' },
          { type: 'example', label: 'Example 3 — Working Backwards', body: 'You paid $53.50 including 7% tax. Pre-tax price? → $53.50 ÷ 1.07 = <b>$50.00</b>' }
        ], rw: ['Real World', 'Always mentally add tax before deciding if something is in your budget. A $950 laptop in a city with 9.5% tax actually costs $1,040.25.'] },
      { title: 'Discounts & Sales',
        body: '"30% off" means you pay 70% of the original price. Two stacked discounts (20% then 10%) are NOT the same as 30% off.',
        items: [
          { type: 'formula', text: 'Sale Price = Original × (1 − Discount %)\nTwo stacked discounts: multiply both factors' },
          { type: 'example', label: 'Example 1', body: '$80 shoes, 25% off → $80 × 0.75 = <b>$60</b>' },
          { type: 'example', label: 'Example 2 — Stacked', body: '$200 jacket: 20% off then 15% off → $200 × 0.80 = $160, then × 0.85 = <b>$136</b> (not $130)' }
        ], rw: ['Real World', 'Stores sometimes inflate "original prices" before discounting. Always compare the sale price to competitors.'] },
      { title: 'Tipping',
        body: 'Standard tips: 15–20% at restaurants, 10–15% for delivery, 15–20% for stylists. Quick trick: 10% = move decimal left one place. Double for 20%.',
        items: [
          { type: 'example', label: 'Example 1 — Mental Math', body: '$38 bill, 20% tip → 10% = $3.80, doubled = $7.60 tip → Total: <b>$45.60</b>' },
          { type: 'example', label: 'Example 2 — Group Dinner', body: 'Table of 4, bill $148, 18% tip: $148 × 1.18 = $174.64 ÷ 4 = <b>$43.66 each</b>' }
        ], rw: null },
      { title: 'Percent Change',
        body: 'Percent change compares growth or shrinkage relative to the starting value. Essential for comparing salaries, tracking rent increases, and analyzing investment returns.',
        items: [
          { type: 'formula', text: '% Change = ((New Value − Old Value) ÷ Old Value) × 100' },
          { type: 'example', label: 'Example 1 — Rent', body: 'From $950 to $1,140 → ((1140−950)÷950)×100 = <b>+20%</b>' },
          { type: 'example', label: 'Example 2 — Salary', body: '$48,000 + $3,200 raise → (3200÷48000)×100 = <b>+6.67% raise</b>' }
        ], rw: ['Real World', 'Inflation typically rises 2–4%/year. If your salary rises only 1%, you effectively took a 2–3% pay cut in purchasing power.'] }
    ],
    questions: [
      ["A $60 meal with an 18% tip. What is the total bill?", ["A) $68.80","B) $70.80","C) $72.80","D) $66.00"], "B", "$60 × 1.18 = $70.80."],
      ["Sneakers cost $120 and are 30% off. What do you pay?", ["A) $84","B) $90","C) $36","D) $96"], "A", "$120 × 0.70 = $84. You save $36."],
      ["A TV was $400, now $460. Percent increase?", ["A) 10%","B) 12%","C) 15%","D) 18%"], "C", "((460−400)÷400)×100 = 15%."],
      ["Sales tax is 7%. Total on a $250 purchase?", ["A) $257","B) $267.50","C) $275","D) $272"], "B", "$250 × 1.07 = $267.50."],
      ["You score 45 out of 60. What percentage?", ["A) 72%","B) 75%","C) 78%","D) 80%"], "B", "(45÷60)×100 = 75%."],
      ["Jacket: 20% off, then extra 10% off. Original $150. Final price?", ["A) $105","B) $108","C) $112","D) $115"], "B", "$150 × 0.80 = $120, then × 0.90 = $108. (Not $105 — stacked discounts aren't additive.)"],
      ["You paid $86 including 7.5% tax. Pre-tax price?", ["A) $78.60","B) $79.44","C) $80.00","D) $81.20"], "C", "$86 ÷ 1.075 = $80.00."],
      ["$75 bill, 20% tip, split 3 ways. Each person pays?", ["A) $25","B) $30","C) $29","D) $28"], "B", "$75 × 1.20 = $90 ÷ 3 = $30 each."],
      ["Rent $1,200 → $1,320. Percent increase?", ["A) 8%","B) 10%","C) 12%","D) 15%"], "B", "(120÷1200)×100 = 10%."],
      ["Phone $999 → $799. Percent reduced?", ["A) 15%","B) 18%","C) 20%","D) 22%"], "C", "((999−799)÷999)×100 ≈ 20%."],

// ── State ──────────────────────────────────────────────────────────────────────
const state = {
  activeTopic: 0,
  activeTab: 'lesson',  // 'lesson' | 'quiz'
  answers: {},          // topicIdx_qIdx -> chosen letter
  scores: Array(TOPICS.length).fill(null).map(() => ({ correct: 0, total: 0, answered: 0 }))
};

// ── Helpers ────────────────────────────────────────────────────────────────────
function getTopicScore(t) {
  const s = state.scores[t];
  return s;
}

function globalTotals() {
  let correct = 0, answered = 0, total = 0;
  for (let i = 0; i < TOPICS.length; i++) {
    const s = state.scores[i];
    correct += s.correct;
    answered += s.answered;
    total += TOPICS[i].questions.length;
  }
  return { correct, answered, total };
}

function updateGlobalScore() {
  const { correct, answered, total } = globalTotals();
  document.getElementById('globalScore').textContent = `${correct} / ${answered}`;
}

function answerKey(topicIdx, qIdx) { return `${topicIdx}_${qIdx}`; }

// ── Render Helpers ─────────────────────────────────────────────────────────────
function renderItem(item) {
  if (item.type === 'formula') {
    const lines = item.text.split('\n').map(l => `<div>${escHtml(l)}</div>`).join('');
    return `<div class="formula-box">${lines}</div>`;
  }
  if (item.type === 'example') {
    const bodyHtml = item.body.split('\n').map(l => `<div>${l}</div>`).join('');
    return `<div class="example-box">
      <div class="example-label">${escHtml(item.label)}</div>
      <div class="example-body">${bodyHtml}</div>
    </div>`;
  }
  return '';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Build Lesson ───────────────────────────────────────────────────────────────
function renderLesson(topicIdx) {
  const t = TOPICS[topicIdx];
  let html = '';
  t.sections.forEach(sec => {
    let itemsHtml = sec.items.map(renderItem).join('');
    let rwHtml = '';
    if (sec.rw) {
      rwHtml = `<div class="rw-box">
        <div class="rw-label">🌍 ${escHtml(sec.rw[0])}</div>
        <div class="rw-body">${sec.rw[1]}</div>
      </div>`;
    }
    html += `<div class="section-card">
      <div class="section-title">${escHtml(sec.title)}</div>
      <div class="section-body">${sec.body}</div>
      ${itemsHtml}
      ${rwHtml}
    </div>`;
  });
  return html;
}

// ── Build Quiz ─────────────────────────────────────────────────────────────────
function renderQuiz(topicIdx) {
  const t = TOPICS[topicIdx];
  const s = state.scores[topicIdx];
  const allDone = s.answered === t.questions.length;

  let resultHtml = '';
  if (allDone) {
    const pct = Math.round(s.correct / t.questions.length * 100);
    const msg = pct >= 90 ? '🏆 Excellent work!' : pct >= 70 ? '👍 Good job!' : '📚 Keep studying!';
    resultHtml = `<div class="quiz-result visible">
      <div class="result-score">${s.correct}/${t.questions.length}</div>
      <div class="result-label">${pct}% correct</div>
      <div class="result-message">${msg}</div>
      <button class="result-restart" onclick="resetQuiz(${topicIdx})">Try Again</button>
    </div>`;
  }

  let questionsHtml = t.questions.map((q, qi) => {
    const key = answerKey(topicIdx, qi);
    const chosen = state.answers[key];
    const correct = q[2];
    const answered = chosen !== undefined;

    let cardClass = '';
    if (answered) {
      cardClass = chosen === correct ? 'answered-correct' : 'answered-wrong';
    }

    const opts = q[1].map((opt, oi) => {
      const letter = opt.charAt(0);
      let btnClass = 'option-btn';
      if (answered) {
        if (letter === correct) btnClass += ' reveal-correct';
        if (letter === chosen && chosen !== correct) btnClass += ' wrong';
        if (letter === chosen && chosen === correct) btnClass = 'option-btn correct';
      }
      const disabled = answered ? 'disabled' : '';
      return `<button class="${btnClass}" ${disabled} onclick="answer(${topicIdx}, ${qi}, '${letter}')">
        <span class="opt-letter">${letter}</span>
        <span>${escHtml(opt.slice(3))}</span>
      </button>`;
    }).join('');

    let feedbackHtml = '';
    if (answered) {
      const isCorrect = chosen === correct;
      feedbackHtml = `<div class="feedback-box ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
        <span class="feedback-icon">${isCorrect ? '✓' : '✗'}</span>
        ${isCorrect ? '<b>Correct!</b>' : `<b>Incorrect.</b>`} ${escHtml(q[3])}
      </div>`;
    }

    return `<div class="question-card ${cardClass}" id="qcard_${topicIdx}_${qi}">
      <div class="question-num">Question ${qi + 1} of ${t.questions.length}</div>
      <div class="question-text">${escHtml(q[0])}</div>
      <div class="options-grid">${opts}</div>
      ${feedbackHtml}
    </div>`;
  }).join('');

  const fillPct = s.answered / t.questions.length * 100;
  const progressBar = `<div class="quiz-header">
    <div class="quiz-header-text">
      <h3>Practice Quiz</h3>
      <p>${t.questions.length} questions · tap an option to answer</p>
    </div>
    <div class="quiz-progress-bar-wrap">
      <div class="quiz-progress-label">${s.answered} / ${t.questions.length} answered</div>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" style="width:${fillPct}%"></div>
      </div>
    </div>
  </div>`;

  return progressBar + resultHtml + questionsHtml;
}

// ── Answer handler ─────────────────────────────────────────────────────────────
function answer(topicIdx, qIdx, letter) {
  const key = answerKey(topicIdx, qIdx);
  if (state.answers[key] !== undefined) return;
  state.answers[key] = letter;

  const q = TOPICS[topicIdx].questions[qIdx];
  const correct = q[2];
  const isCorrect = letter === correct;

  const s = state.scores[topicIdx];
  s.answered++;
  if (isCorrect) s.correct++;
  s.total = TOPICS[topicIdx].questions.length;

  // Re-render the quiz panel in place
  const quizPanel = document.getElementById(`quiz_${topicIdx}`);
  if (quizPanel) quizPanel.innerHTML = renderQuiz(topicIdx);

  // Update nav progress
  updateNavProgress(topicIdx);
  updateGlobalScore();
}

// ── Reset quiz ─────────────────────────────────────────────────────────────────
function resetQuiz(topicIdx) {
  const t = TOPICS[topicIdx];
  state.scores[topicIdx] = { correct: 0, total: 0, answered: 0 };
  for (let qi = 0; qi < t.questions.length; qi++) {
    delete state.answers[answerKey(topicIdx, qi)];
  }
  const quizPanel = document.getElementById(`quiz_${topicIdx}`);
  if (quizPanel) quizPanel.innerHTML = renderQuiz(topicIdx);
  updateNavProgress(topicIdx);
  updateGlobalScore();
}

// ── Navigation ─────────────────────────────────────────────────────────────────
function switchTopic(topicIdx) {
  // Update active nav
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', i === topicIdx);
  });
  // Show/hide panels
  document.querySelectorAll('.topic-section').forEach((el, i) => {
    el.classList.toggle('active', i === topicIdx);
  });
  state.activeTopic = topicIdx;
  // Scroll to top
  window.scrollTo({ top: document.querySelector('.app').offsetTop - 80, behavior: 'smooth' });
}

function switchTab(topicIdx, tab) {
  document.querySelectorAll(`.tab_${topicIdx}`).forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  document.getElementById(`lesson_${topicIdx}`).classList.toggle('active', tab === 'lesson');
  document.getElementById(`quiz_${topicIdx}`).classList.toggle('active', tab === 'quiz');
}

function updateNavProgress(topicIdx) {
  const s = state.scores[topicIdx];
  const el = document.getElementById(`navprog_${topicIdx}`);
  if (el) {
    el.textContent = s.answered > 0 ? `${s.correct}/${s.answered}` : '';
  }
}

// ── Build the whole UI ─────────────────────────────────────────────────────────
function init() {
  const nav = document.getElementById('navList');
  const main = document.getElementById('mainContent');

  TOPICS.forEach((t, i) => {
    // Nav item
    const li = document.createElement('li');
    li.className = 'nav-item' + (i === 0 ? ' active' : '');
    li.onclick = () => switchTopic(i);
    li.innerHTML = `
      <div class="nav-icon">${escHtml(t.icon)}</div>
      <span>${escHtml(t.name)}</span>
      <span class="nav-progress" id="navprog_${i}"></span>
    `;
    nav.appendChild(li);

    // Topic section
    const sec = document.createElement('div');
    sec.className = 'topic-section panel' + (i === 0 ? ' active' : '');

    // Topic header
    sec.innerHTML = `
      <div class="topic-header">
        <div class="topic-header-top">
          <div class="topic-icon-lg">${escHtml(t.icon)}</div>
          <div>
            <div class="topic-name">${escHtml(t.name)}</div>
            <div class="topic-desc">${escHtml(t.desc)}</div>
          </div>
        </div>
      </div>

      <div class="topic-tabs">
        <button class="tab-btn tab_${i} active" data-tab="lesson" onclick="switchTab(${i},'lesson')">📖 Lesson</button>
        <button class="tab-btn tab_${i}" data-tab="quiz" onclick="switchTab(${i},'quiz')">✏️ Practice Quiz</button>
      </div>

      <div class="panel active" id="lesson_${i}">
        ${renderLesson(i)}
      </div>
      <div class="panel" id="quiz_${i}">
        ${renderQuiz(i)}
      </div>
    `;

    main.appendChild(sec);
  });
}

init();
</script>
